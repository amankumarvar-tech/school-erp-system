{% extends 'base.html' %}
{% block title %}Add Event{% endblock %}
{% block page_title %}Add Event{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>🗓️ Add Event</h1></div>
    <a href="{% url 'events_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Event Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Organized By</label>
                <input type="text" name="organized_by" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Event Date</label>
                <input type="date" name="event_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">End Date (optional)</label>
                <input type="date" name="end_date" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Venue</label>
                <input type="text" name="venue" class="form-control">
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:22px;">
                <input type="checkbox" name="is_holiday" id="is_holiday" style="width:18px;height:18px;">
                <label for="is_holiday" class="form-label" style="margin:0;">Mark as Holiday</label>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Event</button>
    </form>
</div>
{% endblock %}
