{% extends 'base.html' %}
{% block title %}Send Message{% endblock %}
{% block page_title %}Send Message{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>✉️ Send Message</h1><p>Send internal message to staff/admin</p></div>
    <a href="{% url 'message_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Inbox</a>
</div>
<div class="card" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">To (Recipient)</label>
            <select name="receiver" class="form-control" required>
                <option value="">-- Select User --</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.get_full_name|default:u.username }} ({{ u.username }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control" placeholder="Enter subject..." required>
        </div>
        <div class="form-group">
            <label class="form-label">Message</label>
            <textarea name="content" class="form-control" rows="6" placeholder="Type your message here..." required></textarea>
        </div>
        <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Message</button>
            <a href="{% url 'message_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
