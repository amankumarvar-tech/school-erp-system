{% extends 'base.html' %}
{% block title %}Add Route{% endblock %}
{% block page_title %}Add Bus Route{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add New Route</h1></div><a href="{% url 'transport_dashboard' %}" class="btn btn-outline">Back</a></div>
<div style="max-width:700px;">
<div class="card">
<form method="post">{% csrf_token %}
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Route Number *</label><input name="route_number" class="form-control" placeholder="e.g. R01" required></div>
        <div class="form-group"><label class="form-label">Route Name *</label><input name="route_name" class="form-control" placeholder="e.g. North Campus Route" required></div>
        <div class="form-group"><label class="form-label">Start Point *</label><input name="start_point" class="form-control" required></div>
        <div class="form-group"><label class="form-label">End Point *</label><input name="end_point" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Distance (km)</label><input type="number" name="distance_km" class="form-control" value="0"></div>
        <div class="form-group"><label class="form-label">Monthly Fee (₹)</label><input type="number" name="monthly_fee" class="form-control" value="0"></div>
        <div class="form-group"><label class="form-label">Morning Departure *</label><input type="time" name="morning_departure" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Evening Departure *</label><input type="time" name="evening_departure" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Driver Name *</label><input name="driver_name" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Driver Phone *</label><input name="driver_phone" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Vehicle Number *</label><input name="vehicle_number" class="form-control" placeholder="e.g. DL-01-AB-1234" required></div>
        <div class="form-group"><label class="form-label">Capacity</label><input type="number" name="capacity" class="form-control" value="40"></div>
    </div>
    <div class="form-group"><label class="form-label">Stops (comma separated)</label><input name="stops" class="form-control" placeholder="Stop 1, Stop 2, Stop 3..."></div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Route</button>
</form>
</div>
</div>
{% endblock %}
