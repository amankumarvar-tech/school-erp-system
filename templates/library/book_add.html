{% extends 'base.html' %}
{% block title %}Add Book{% endblock %}
{% block page_title %}Add Book{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Book to Library</h1></div><a href="{% url 'book_list' %}" class="btn btn-outline">Back</a></div>
<div style="max-width:700px;">
<div class="card">
<form method="post">{% csrf_token %}
    <div class="form-grid">
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">Book Title *</label><input name="title" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Author *</label><input name="author" class="form-control" required></div>
        <div class="form-group"><label class="form-label">ISBN</label><input name="isbn" class="form-control" placeholder="e.g. 978-0-06-112008-4"></div>
        <div class="form-group"><label class="form-label">Publisher</label><input name="publisher" class="form-control"></div>
        <div class="form-group"><label class="form-label">Publication Year</label><input type="number" name="publication_year" class="form-control" placeholder="2024"></div>
        <div class="form-group"><label class="form-label">Category</label>
            <select name="category" class="form-control">
                <option value="">Select Category</option>
                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-label">Total Copies *</label><input type="number" name="total_copies" class="form-control" value="1" required></div>
        <div class="form-group"><label class="form-label">Shelf Location</label><input name="shelf_location" class="form-control" placeholder="e.g. A-12"></div>
        <div class="form-group"><label class="form-label">Price (₹)</label><input type="number" name="price" class="form-control" value="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Book</button>
</form>
</div>
</div>
{% endblock %}
