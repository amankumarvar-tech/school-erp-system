{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>Add New Student</h1><p>Fill in all required details</p></div>
    <a href="{% url 'student_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<form method="post">
{% csrf_token %}
<div class="card mb-4">
    <div class="card-header"><div class="card-title">📋 Basic Information</div></div>
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Admission Number *</label>
            <input type="text" name="admission_number" class="form-control" placeholder="e.g. ADM2024001" required>
        </div>
        <div class="form-group">
            <label class="form-label">First Name *</label>
            <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Last Name *</label>
            <input type="text" name="last_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Date of Birth *</label>
            <input type="date" name="date_of_birth" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Gender *</label>
            <select name="gender" class="form-control" required>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-control">
                <option value="">Select</option>
                <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-control">
                <option value="GEN">General</option><option value="OBC">OBC</option>
                <option value="SC">SC</option><option value="ST">ST</option><option value="EWS">EWS</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Admission Date *</label>
            <input type="date" name="admission_date" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Class</label>
            <select name="current_class" class="form-control">
                <option value="">Select Class</option>
                {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
        </div>
        <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control">
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">Address *</label>
        <textarea name="address" class="form-control" rows="3" required></textarea>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header"><div class="card-title">👨‍👩‍👦 Parent Information</div></div>
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Father's Name *</label>
            <input type="text" name="father_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Father's Phone *</label>
            <input type="tel" name="father_phone" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Mother's Name *</label>
            <input type="text" name="mother_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Mother's Phone</label>
            <input type="tel" name="mother_phone" class="form-control">
        </div>
    </div>
</div>

<div style="text-align:right;display:flex;gap:10px;justify-content:flex-end;">
    <a href="{% url 'student_list' %}" class="btn btn-outline">Cancel</a>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Student</button>
</div>
</form>
{% endblock %}
