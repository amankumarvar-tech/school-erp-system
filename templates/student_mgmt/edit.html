{% extends 'base.html' %}
{% block title %}Edit {{ student.full_name }}{% endblock %}
{% block page_title %}Edit Student{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>Edit: {{ student.full_name }}</h1><p>{{ student.admission_number }}</p></div>
    <a href="{% url 'student_detail' student.pk %}" class="btn btn-outline">Cancel</a>
</div>
<form method="post">
{% csrf_token %}
<div class="card mb-4">
    <div class="card-header"><div class="card-title">Edit Details</div></div>
    <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name</label><input name="first_name" value="{{ student.first_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input name="last_name" value="{{ student.last_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Email</label><input name="email" type="email" value="{{ student.email }}" class="form-control"></div>
        <div class="form-group"><label class="form-label">Phone</label><input name="phone" value="{{ student.phone }}" class="form-control"></div>
        <div class="form-group"><label class="form-label">Father's Name</label><input name="father_name" value="{{ student.father_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Father's Phone</label><input name="father_phone" value="{{ student.father_phone }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Mother's Name</label><input name="mother_name" value="{{ student.mother_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Class</label>
            <select name="current_class" class="form-control">
                {% for cls in classes %}<option value="{{ cls.id }}" {% if student.current_class == cls %}selected{% endif %}>{{ cls }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="form-group"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ student.address }}</textarea></div>
</div>
<div style="text-align:right;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button></div>
</form>
{% endblock %}
