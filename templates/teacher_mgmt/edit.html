{% extends 'base.html' %}
{% block title %}Edit Teacher{% endblock %}
{% block page_title %}Edit Teacher{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit: {{ teacher.full_name }}</h1></div><a href="{% url 'teacher_detail' teacher.pk %}" class="btn btn-outline">Cancel</a></div>
<form method="post">{% csrf_token %}
<div class="card mb-4">
    <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name</label><input name="first_name" value="{{ teacher.first_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input name="last_name" value="{{ teacher.last_name }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" value="{{ teacher.email }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Phone</label><input name="phone" value="{{ teacher.phone }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Designation</label><input name="designation" value="{{ teacher.designation }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Qualification</label><input name="qualification" value="{{ teacher.qualification }}" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Experience</label><input type="number" name="experience_years" value="{{ teacher.experience_years }}" class="form-control"></div>
        <div class="form-group"><label class="form-label">Basic Salary</label><input type="number" name="basic_salary" value="{{ teacher.basic_salary }}" class="form-control"></div>
    </div>
</div>
<div style="text-align:right;"><button type="submit" class="btn btn-primary">Save Changes</button></div>
</form>
{% endblock %}
