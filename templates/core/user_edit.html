{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>✏️ Edit User — {{ edit_user.username }}</h1></div>
    <a href="{% url 'user_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<div class="card" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name }}">
            </div>
            <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name }}">
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" value="{{ edit_user.username }}" disabled style="background:#f1f5f9;">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ edit_user.email }}">
            </div>
            <div class="form-group">
                <label class="form-label">New Password <span class="text-muted">(blank = no change)</span></label>
                <input type="password" name="password" class="form-control" placeholder="Naya password (optional)">
            </div>
            <div class="form-group">
                <label class="form-label">Role *</label>
                <select name="role" class="form-control" required>
                    <option value="superadmin" {% if profile.role == 'superadmin' %}selected{% endif %}>👑 Super Admin</option>
                    <option value="admin" {% if profile.role == 'admin' %}selected{% endif %}>🛡️ Admin</option>
                    <option value="staff" {% if profile.role == 'staff' %}selected{% endif %}>👤 Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
            </div>
            <div class="form-group">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" value="{{ profile.department }}">
            </div>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" name="is_active" id="is_active" {% if profile.is_active %}checked{% endif %} style="width:18px;height:18px;">
            <label for="is_active" class="form-label" style="margin:0;">Account Active</label>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update User</button>
            <a href="{% url 'user_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
