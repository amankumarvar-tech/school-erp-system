<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School ERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #2d3561 50%, #1a1f36 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,79,216,0.3) 0%, transparent 70%);
            top: -100px; right: -100px;
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            border-radius: 50%;
        }
        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 48px;
            width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .school-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }
        .login-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #1a1f36;
        }
        .login-header p {
            color: #8892a4;
            font-size: 14px;
            margin-top: 6px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1a1f36;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #8892a4;
            font-size: 15px;
        }
        .form-control {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 11px;
            font-size: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b4fd8;
            box-shadow: 0 0 0 4px rgba(59,79,216,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a1f36;
            color: white;
            border: none;
            border-radius: 11px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #3b4fd8; transform: translateY(-1px); }
        .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 9px; margin-bottom: 16px; font-size: 13px; }
        .demo-creds {
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: #f0f2ff;
            border-radius: 10px;
            font-size: 12px;
            color: #4a5568;
        }
        .demo-creds strong { color: #3b4fd8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="school-icon">🏫</div>
            <h1>EduManage ERP</h1>
            <p>School Management System — Sign in to continue</p>
        </div>
        {% if error %}
        <div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In to Dashboard</button>
        </form>
        <div class="demo-creds">
            Demo: <strong>admin</strong> / <strong>admin123</strong>
        </div>
    </div>
</body>
</html>
