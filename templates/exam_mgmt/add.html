{% extends 'base.html' %}
{% block title %}Schedule Exam{% endblock %}
{% block page_title %}Schedule Exam{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Schedule New Exam</h1></div><a href="{% url 'exam_list' %}" class="btn btn-outline">Back</a></div>
<div style="max-width:700px;">
<div class="card">
<form method="post">{% csrf_token %}
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Exam Type *</label>
            <select name="exam_type" class="form-control" required>
                <option value="">Select Exam Type</option>
                {% for et in exam_types %}<option value="{{ et.id }}">{{ et.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-label">Class *</label>
            <select name="class_name" class="form-control" required>
                <option value="">Select Class</option>
                {% for cls in classes %}<option value="{{ cls.id }}">{{ cls }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-label">Subject *</label>
            <select name="subject" class="form-control" required>
                <option value="">Select Subject</option>
                {% for sub in subjects %}<option value="{{ sub.id }}">{{ sub.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-label">Exam Date *</label><input type="date" name="exam_date" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Start Time *</label><input type="time" name="start_time" class="form-control" required></div>
        <div class="form-group"><label class="form-label">End Time *</label><input type="time" name="end_time" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Max Marks *</label><input type="number" name="max_marks" class="form-control" value="100" required></div>
        <div class="form-group"><label class="form-label">Pass Marks *</label><input type="number" name="pass_marks" class="form-control" value="33" required></div>
        <div class="form-group"><label class="form-label">Venue</label><input name="venue" class="form-control" placeholder="e.g. Exam Hall 1"></div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-calendar-check"></i> Schedule Exam</button>
</form>
</div>
</div>
{% endblock %}
