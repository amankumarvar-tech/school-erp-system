{% extends 'base.html' %}
{% block title %}Add Hostel{% endblock %}
{% block page_title %}Add Hostel{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add New Hostel</h1></div><a href="{% url 'hostel_dashboard' %}" class="btn btn-outline">Back</a></div>
<div style="max-width:500px;"><div class="card">
<form method="post">{% csrf_token %}
    <div class="form-group"><label class="form-label">Hostel Name *</label><input name="name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Type *</label><select name="type" class="form-control"><option value="boys">Boys</option><option value="girls">Girls</option><option value="mixed">Mixed</option></select></div>
    <div class="form-group"><label class="form-label">Warden Name *</label><input name="warden_name" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Warden Phone *</label><input name="warden_phone" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Total Rooms</label><input type="number" name="total_rooms" class="form-control" value="10"></div>
    <div class="form-group"><label class="form-label">Monthly Fee (₹)</label><input type="number" name="monthly_fee" class="form-control" value="0"></div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Hostel</button>
</form>
</div></div>
{% endblock %}
